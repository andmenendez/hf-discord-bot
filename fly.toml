# fly.toml app configuration file generated for hf-discord-bot on 2026-04-03T00:50:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hf-discord-bot'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
